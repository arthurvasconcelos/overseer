version: 2

project_name: overseer

before:
  hooks:
    - go -C cli mod tidy

builds:
  - id: overseer
    dir: cli
    main: .
    binary: overseer
    ldflags:
      - -s -w -X github.com/arthurvasconcelos/overseer/cmd.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: overseer
    formats:
      - tar.gz
    name_template: "overseer_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - none*

checksum:
  name_template: "overseer_{{ .Version }}_checksums.txt"

brews:
  - name: overseer
    repository:
      owner: arthurvasconcelos
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/arthurvasconcelos/overseer"
    description: "Personal CLI for environment setup and daily automation"
    license: "MIT"
    install: |
      bin.install "overseer"
      system bin/"overseer", "generate-docs", "#{buildpath}/man"
      man1.install Dir["#{buildpath}/man/*.1"]
      generate_completions_from_executable(bin/"overseer", "completion")
    test: |
      assert_match version.to_s, shell_output("#{bin}/overseer --version")

release:
  github:
    owner: arthurvasconcelos
    name: overseer
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

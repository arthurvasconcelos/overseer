version: 2

project_name: overseer

before:
  hooks:
    - go -C cli mod tidy
    - go -C cli run . generate-docs ../man

builds:
  - id: overseer
    dir: cli
    main: .
    binary: overseer
    ldflags:
      - -s -w -X github.com/arthurvasconcelos/overseer/cmd.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: overseer
    formats:
      - tar.gz
    name_template: "overseer_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - man/*.1

checksum:
  name_template: "overseer_{{ .Version }}_checksums.txt"

homebrew_casks:
  - name: overseer
    repository:
      owner: arthurvasconcelos
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/arthurvasconcelos/overseer"
    description: "Personal CLI for environment setup and daily automation"
    binaries:
      - overseer
    manpages:
      - man/*.1
    generate_completions_from_executable:
      shell_parameter_format: cobra
      shells:
        - bash
        - zsh
        - fish

release:
  github:
    owner: arthurvasconcelos
    name: overseer
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

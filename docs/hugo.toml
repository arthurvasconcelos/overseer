baseURL = "https://arthurvasconcelos.com.br/overseer/"
languageCode = "en-us"
title = "overseer"
canonifyURLs = true

[outputs]
  home = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[security]
  [security.http]
    methods = ['(?i)GET|POST']
    urls = ['(?i)^https://cdn\.jsdelivr\.net/', '(?i)^https?://[a-z]']

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true

[params]
  description = "A personal machine management CLI for developers."
  customCSS = ["css/custom.css"]

  [params.navbar]
    displayTitle = true
    displayLogo = false

  [params.footer]
    enable = true
    displayCopyright = true

  [params.editURL]
    enable = false

[menu]
  [[menu.main]]
    identifier = "commands"
    name = "Commands"
    pageRef = "/docs/commands"
    weight = 1
  [[menu.main]]
    identifier = "concepts"
    name = "Concepts"
    pageRef = "/docs/concepts"
    weight = 2
  [[menu.main]]
    identifier = "plugins"
    name = "Plugins"
    pageRef = "/docs/plugins"
    weight = 3
  [[menu.main]]
    identifier = "github"
    name = "GitHub"
    url = "https://github.com/arthurvasconcelos/overseer"
    weight = 4
    [menu.main.params]
      type = "icon"
      icon = "github"
